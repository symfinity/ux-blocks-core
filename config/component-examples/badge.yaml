schema: showcase-examples/1.0
role: badge
twig_name: Badge
requires_stimulus: false
sections:
  - id: semantic
    title: Semantic variants
    layout: row
    items:
      - variant: primary
        label: Primary
        props: { variant: primary }
        slot_text: Primary
      - variant: secondary
        label: Secondary
        props: { variant: secondary }
        slot_text: Secondary
      - variant: tertiary
        label: Tertiary
        props: { variant: tertiary }
        slot_text: Tertiary
      - variant: danger
        label: Danger
        props: { variant: danger }
        slot_text: Danger
      - variant: success
        label: Success
        props: { variant: success }
        slot_text: Success
      - variant: info
        label: Info
        props: { variant: info }
        slot_text: Info
      - variant: warning
        label: Warning
        props: { variant: warning }
        slot_text: Warning
      - variant: ghost
        label: Ghost
        props: { variant: ghost }
        slot_text: Ghost
  - id: sizes
    title: Sizes (secondary)
    layout: row
    items:
      - variant: sm
        label: Small
        props: { size: sm, variant: secondary }
        slot_text: Small
      - variant: md
        label: Medium
        props: { size: md, variant: secondary }
        slot_text: Medium
      - variant: lg
        label: Large
        props: { size: lg, variant: secondary }
