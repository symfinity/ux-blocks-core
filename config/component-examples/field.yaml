role: field
twig_name: Field
groups:
  - id: default
    section: Default
    title: Default
    layout: inline-row
    items:
      - id: default-vertical
        label: Vertical
        props:
          label: Email
        slot_twig: '<twig:Input type="email" placeholder="you@example.com" />'
  - id: disabled
    section: Disabled
    title: Disabled
    layout: inline-row
    items:
      - id: disabled-input
        label: Disabled
        props:
          label: Username
        slot_twig: '<twig:Input :disabled="true" placeholder="Disabled" />'
  - id: invalid
    section: Invalid / validation
    title: Invalid / validation
    layout: inline-row
    items:
      - id: invalid-field
        label: Invalid
        props:
          label: Password
          error: Password must be at least 8 characters.
          invalid: true
        slot_twig: '<twig:Input type="password" :invalid="true" />'
