schema: showcase-examples/1.0
role: input
twig_name: Input
requires_stimulus: false
sections:
  - id: states
    title: States
    layout: stack
    items:
      - variant: default
        label: Default
        props: { placeholder: 'you@example.com' }
      - variant: disabled
        label: Disabled
        props: { disabled: true, value: Disabled }
      - variant: invalid
        label: Invalid
        props: { invalid: true, value: 'invalid@example.com' }
  - id: icons
    title: Icon adornments
    layout: stack
    items:
      - variant: start-icon
        label: Search input
        props: { icon: 'lucide:search', iconPosition: start, placeholder: 'Search…' }
      - variant: end-icon
        label: Email input
        props: { icon: 'lucide:mail', iconPosition: end, placeholder: 'you@example.com' }
