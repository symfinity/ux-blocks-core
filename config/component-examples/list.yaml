schema: showcase-examples/1.0
role: list
twig_name: List
requires_stimulus: false
sections:
  - id: demo
    title: Item list
    layout: stack
    items:
      - variant: default
        label: Default
        props: {}
        render_partial: showcase/_compounds/list_demo.html.twig
  - id: gap
    title: Gap scale
    layout: row
    items:
      - variant: gap-sm
        label: Small gap
        props: { gap: sm }
        render_partial: showcase/_compounds/list_demo.html.twig
      - variant: gap-md
        label: Medium gap
        props: { gap: md }
        render_partial: showcase/_compounds/list_demo.html.twig
      - variant: gap-lg
        label: Large gap
        props: { gap: lg }
        render_partial: showcase/_compounds/list_demo.html.twig
  - id: columns
    title: Columns
    layout: row
    items:
      - variant: columns
        label: Two columns
        props: { variant: columns, gap: md }
        render_partial: showcase/_compounds/list_demo.html.twig
