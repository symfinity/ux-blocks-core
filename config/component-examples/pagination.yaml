schema: showcase-examples/1.0
role: pagination
twig_name: Pagination
requires_stimulus: false
sections:
  - id: pages
    title: Page positions
    layout: row
    items:
      - variant: first
        label: First page
        props: { page: 1, pages: 5 }
      - variant: middle
        label: Middle page
        props: { page: 3, pages: 5 }
      - variant: last
        label: Last page
        props: { page: 5, pages: 5 }
  - id: lengths
    title: Total pages
    layout: row
    items:
      - variant: short
        label: 3 pages
        props: { page: 2, pages: 3 }
      - variant: long
        label: 10 pages
        props: { page: 5, pages: 10 }
