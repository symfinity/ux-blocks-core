schema: showcase-examples/1.0
role: stack
twig_name: Stack
requires_stimulus: false
sections:
  - id: gap
    title: Gap scale
    layout: row
    items:
      - variant: gap-sm
        label: Small gap
        props: { gap: sm }
        render_partial: showcase/_compounds/stack_demo.html.twig
      - variant: gap-md
        label: Medium gap
        props: { gap: md }
        render_partial: showcase/_compounds/stack_demo.html.twig
      - variant: gap-lg
        label: Large gap
        props: { gap: lg }
        render_partial: showcase/_compounds/stack_demo.html.twig
  - id: direction
    title: Direction
    layout: row
    items:
      - variant: vertical
        label: Vertical
        props: { direction: vertical, gap: md }
        render_partial: showcase/_compounds/stack_demo.html.twig
      - variant: horizontal
        label: Horizontal
        props: { direction: horizontal, gap: md }
        render_partial: showcase/_compounds/stack_demo.html.twig
  - id: density
    title: Density
    layout: row
    items:
      - variant: comfortable
        label: Comfortable
        props: { density: comfortable, gap: md }
        render_partial: showcase/_compounds/stack_demo.html.twig
      - variant: compact
        label: Compact
        props: { density: compact, gap: md }
        render_partial: showcase/_compounds/stack_demo.html.twig
