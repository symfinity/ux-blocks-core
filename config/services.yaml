services:
  _defaults:
    autowire: true
    autoconfigure: true

  Symfinity\UxBlocksCore\:
    resource: '../src/'
    exclude:
      - '../src/SymfinityUxBlocksCoreBundle.php'
      - '../src/DependencyInjection/'

  Symfinity\UxBlocksCore\Css\BlocksCoreCssProvider:
    arguments:
      $packageDir: '%ux_blocks_core.package_dir%'

  Symfinity\UxBlocksCore\Registry\UxRoleRegistry:
    arguments:
      $yamlPath: '%ux_blocks_core.package_dir%/config/ux_roles.yaml'

  Symfinity\UxBlocksCore\Twig\RoleAttributeBridgeListener:
    arguments:
      $fragmentIdsEnabled: '%ux_blocks_core.fragment_ids%'
      $fragmentCounter: '@?Symfinity\UxBlocksCore\Twig\FragmentInstanceCounter'

  Symfinity\UxBlocksCore\Breadcrumb\BreadcrumbTrailResolverInterface:
    alias: Symfinity\UxBlocksCore\Breadcrumb\PathSegmentBreadcrumbTrailResolver
