ux_role_registry: "1.4"
registry_prefix: blocks
roles:
  - role: typography
    twig_component: Typography
    php_class: Symfinity\UxBlocksCore\Twig\Components\Typography
    fragment_id: blocks.typography
    fragment_pattern: "blocks.typography.{n}"
    interaction: nat
    stage: A
    status: v0
  - role: button
    twig_component: Button
    php_class: Symfinity\UxBlocksCore\Twig\Components\Button
    fragment_id: blocks.button
    fragment_pattern: "blocks.button.{n}"
    attributes: [variant, size, appearance, disabled, loading]
    scalar_content: [icon, href]
    styled_parts: []
    interaction: nat, act
    stage: A
    status: v0
    icon_slot:
      position: start | end | only
  - role: separator
    twig_component: Separator
    php_class: Symfinity\UxBlocksCore\Twig\Components\Separator
    fragment_id: blocks.separator
    fragment_pattern: "blocks.separator.{n}"
    interaction: nat
    stage: A
    status: v0
  - role: divider
    twig_component: Divider
    php_class: Symfinity\UxBlocksCore\Twig\Components\Divider
    fragment_id: blocks.divider
    fragment_pattern: "blocks.divider.{n}"
    interaction: nat
    stage: A
    status: v1
  - role: aspect-ratio
    twig_component: AspectRatio
    php_class: Symfinity\UxBlocksCore\Twig\Components\AspectRatio
    fragment_id: blocks.aspect-ratio
    fragment_pattern: "blocks.aspect-ratio.{n}"
    interaction: nat
    stage: A
    status: v1
  - role: scroll-area
    twig_component: ScrollArea
    php_class: Symfinity\UxBlocksCore\Twig\Components\ScrollArea
    fragment_id: blocks.scroll-area
    fragment_pattern: "blocks.scroll-area.{n}"
    interaction: nat
    stage: A
    status: v1
  - role: badge
    twig_component: Badge
    php_class: Symfinity\UxBlocksCore\Twig\Components\Badge
    fragment_id: blocks.badge
    fragment_pattern: "blocks.badge.{n}"
    attributes: [variant, size, appearance]
    scalar_content: [icon]
    styled_parts: []
    interaction: nat
    stage: A
    status: v1
    icon_slot:
      position: locked-start
  - role: avatar
    twig_component: Avatar
    php_class: Symfinity\UxBlocksCore\Twig\Components\Avatar
    fragment_id: blocks.avatar
    fragment_pattern: "blocks.avatar.{n}"
    attributes: [size]
    scalar_content: []
    styled_parts: []
    interaction: nat
    stage: A
    status: v1
  - role: kbd
    twig_component: Kbd
    php_class: Symfinity\UxBlocksCore\Twig\Components\Kbd
    fragment_id: blocks.kbd
    fragment_pattern: "blocks.kbd.{n}"
    interaction: nat
    stage: A
    status: v1
  - role: link
    twig_component: Link
    php_class: Symfinity\UxBlocksCore\Twig\Components\Link
    fragment_id: blocks.link
    fragment_pattern: "blocks.link.{n}"
    attributes: [variant, appearance]
    scalar_content: [icon, href]
    styled_parts: []
    interaction: nat
    stage: A
    status: v1
    icon_slot:
      position: start | locked-end
      default_external: lucide:external-link
  - role: progress
    twig_component: Progress
    php_class: Symfinity\UxBlocksCore\Twig\Components\Progress
    fragment_id: blocks.progress
    fragment_pattern: "blocks.progress.{n}"
    attributes: [variant, size]
    scalar_content: []
    styled_parts: []
    interaction: nat
    stage: A
    status: v1
  - role: spinner
    twig_component: Spinner
    php_class: Symfinity\UxBlocksCore\Twig\Components\Spinner
    fragment_id: blocks.spinner
    fragment_pattern: "blocks.spinner.{n}"
    interaction: nat
    stage: A
    status: v1
    variants:
      size: [sm, md, lg]
      density: [inline, block]
  - role: skeleton
    twig_component: Skeleton
    php_class: Symfinity\UxBlocksCore\Twig\Components\Skeleton
    fragment_id: blocks.skeleton
    fragment_pattern: "blocks.skeleton.{n}"
    interaction: nat
    stage: A
    status: v1
  - role: image
    twig_component: Image
    php_class: Symfinity\UxBlocksCore\Twig\Components\Image
    fragment_id: blocks.image
    fragment_pattern: "blocks.image.{n}"
    interaction: nat
    stage: A
    status: v1
  - role: figure
    twig_component: Figure
    php_class: Symfinity\UxBlocksCore\Twig\Components\Figure
    fragment_id: blocks.figure
    fragment_pattern: "blocks.figure.{n}"
    interaction: nat
    stage: A
    status: v1
  - role: flash
    twig_component: Flash
    php_class: Symfinity\UxBlocksCore\Twig\Components\Flash
    fragment_id: blocks.flash
    fragment_pattern: "blocks.flash.{n}"
    attributes: [variant]
    scalar_content: [icon, title, iconWatermark]
    styled_parts: []
    interaction: nat
    stage: A
    status: v1
    icon_slot:
      position: locked-start
      default_by_variant:
        success: lucide:circle-check
        error: lucide:circle-x
        destructive: lucide:circle-x
        warning: lucide:triangle-alert
        info: lucide:info
    icon_watermark:
      allowed_positions: [top-start, top-end, bottom-start, bottom-end, center]
      default_position: top-end
  - role: flash-stack
    twig_component: FlashStack
    php_class: Symfinity\UxBlocksCore\Twig\Components\FlashStack
    fragment_id: blocks.flash-stack
    fragment_pattern: "blocks.flash-stack.{n}"
    interaction: nat
    stage: A
    status: v1
  - role: page-heading
    twig_component: PageHeading
    php_class: Symfinity\UxBlocksCore\Twig\Components\PageHeading
    fragment_id: blocks.page-heading
    fragment_pattern: "blocks.page-heading.{n}"
    attributes: [size]
    scalar_content: [title, description, icon]
    styled_parts: [actions]
    interaction: nat
    stage: A
    status: v1
    icon_slot:
      position: locked-start
  - role: section-heading
    twig_component: SectionHeading
    php_class: Symfinity\UxBlocksCore\Twig\Components\SectionHeading
    fragment_id: blocks.section-heading
    fragment_pattern: "blocks.section-heading.{n}"
    attributes: [size]
    scalar_content: [title, description, icon]
    styled_parts: [actions]
    interaction: nat
    stage: A
    status: v1
    icon_slot:
      position: locked-start
  - role: grid
    twig_component: Grid
    php_class: Symfinity\UxBlocksCore\Twig\Components\Grid
    fragment_id: blocks.grid
    fragment_pattern: "blocks.grid.{n}"
    nested_components:
      - Grid:Cell
    interaction: nat
    stage: A
    status: v1
  - role: stack
    twig_component: Stack
    php_class: Symfinity\UxBlocksCore\Twig\Components\Stack
    fragment_id: blocks.stack
    fragment_pattern: "blocks.stack.{n}"
    interaction: nat
    stage: A
    status: v1
  - role: list
    twig_component: List
    php_class: Symfinity\UxBlocksCore\Twig\Components\ListBox
    fragment_id: blocks.list
    fragment_pattern: "blocks.list.{n}"
    nested_components:
      - List:Item
      - List:Item:Title
      - List:Item:Description
    interaction: nat
    stage: A
    status: v1
  - role: breadcrumb
    twig_component: Breadcrumb
    php_class: Symfinity\UxBlocksCore\Twig\Components\Breadcrumb
    fragment_id: blocks.breadcrumb
    fragment_pattern: "blocks.breadcrumb.{n}"
    interaction: nat
    stage: A
    status: v1
  - role: pagination
    twig_component: Pagination
    php_class: Symfinity\UxBlocksCore\Twig\Components\Pagination
    fragment_id: blocks.pagination
    fragment_pattern: "blocks.pagination.{n}"
    interaction: nat, act
    stage: A
    status: v1
  - role: search-form
    twig_component: SearchForm
    php_class: Symfinity\UxBlocksCore\Twig\Components\SearchForm
    fragment_id: blocks.search-form
    fragment_pattern: "blocks.search-form.{n}"
    interaction: nat
    stage: A
    status: v1
  - role: button-group
    twig_component: ButtonGroup
    php_class: Symfinity\UxBlocksCore\Twig\Components\ButtonGroup
    fragment_id: blocks.button-group
    fragment_pattern: "blocks.button-group.{n}"
    interaction: nat
    stage: A
    status: v1

deprecated_fragment_aliases:
  - from: blocks.ext.page-heading
    to: blocks.page-heading
    sunset: next-minor
  - from: blocks.ext.section-heading
    to: blocks.section-heading
    sunset: next-minor
  - from: blocks.ext.grid
    to: blocks.grid
    sunset: next-minor
  - from: blocks.ext.stack
    to: blocks.stack
    sunset: next-minor
  - from: blocks.ext.list
    to: blocks.list
    sunset: next-minor
  - from: blocks.ext.breadcrumb
    to: blocks.breadcrumb
    sunset: next-minor
  - from: blocks.ext.pagination
    to: blocks.pagination
    sunset: next-minor
  - from: blocks.ext.button-group
    to: blocks.button-group
    sunset: next-minor
